name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vocabulary-helper

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Substitute repo owner into compose file
        run: |
          sed -i "s|ghcr.io/OWNER/|ghcr.io/${{ github.repository_owner }}/|g" deploy/docker-compose.yml

      - name: Copy deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: "/opt/vocabulary-helper/"
          strip_components: 1
          overwrite: true

      - name: Pull image and restart on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/vocabulary-helper
            if [ ! -f .env ]; then
              echo "Missing /opt/vocabulary-helper/.env on VM. See deploy/README.md." >&2
              exit 1
            fi
            export IMAGE_TAG=$IMAGE_TAG
            sudo docker compose pull app
            sudo docker compose up -d
            sudo docker image prune -f
        env:
          IMAGE_TAG: ${{ github.sha }}

