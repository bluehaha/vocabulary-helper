<html lang="en">
  <head>

    <title>vocabulary-helper · upload queue</title>
    <link rel="stylesheet" href="/styles.css" />

  <body>
    <header class="topbar">
      <h1>Upload queue</h1>

      <section id="queue-region"></section>
    </main>

    <script src="/upload.js"></script>
